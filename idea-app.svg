<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-label="Come nasce un'app: un'idea, le impostazioni e gli algoritmi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf2fb"/>
      <stop offset="1" stop-color="#d6e4f6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8e6"/>
      <stop offset="1" stop-color="#ffe9b0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#123E90" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- sfondo -->
  <rect x="0" y="0" width="720" height="520" rx="26" fill="url(#bg)"/>

  <!-- finestra dell'app -->
  <g filter="url(#sh)">
    <rect x="126" y="62" width="468" height="396" rx="24" fill="#ffffff" stroke="#e3ebf6" stroke-width="2"/>
  </g>
  <!-- barra finestra -->
  <circle cx="158" cy="92" r="5.5" fill="#D4A017"/>
  <circle cx="177" cy="92" r="5.5" fill="#1f5fc0"/>
  <circle cx="196" cy="92" r="5.5" fill="#cdd9ea"/>
  <line x1="126" y1="114" x2="594" y2="114" stroke="#eef2f8" stroke-width="2"/>

  <!-- L'IDEA: lampadina con scintilla -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- raggi/scintille oro -->
    <g stroke="#D4A017" stroke-width="4" opacity=".9">
      <line x1="360" y1="132" x2="360" y2="150"/>
      <line x1="300" y1="150" x2="312" y2="164"/>
      <line x1="420" y1="150" x2="408" y2="164"/>
      <line x1="278" y1="196" x2="296" y2="200"/>
      <line x1="442" y1="196" x2="424" y2="200"/>
    </g>
    <!-- sparkle a 4 punte -->
    <path d="M360 118 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 Z" fill="#B8860B"/>
    <!-- vetro lampadina -->
    <circle cx="360" cy="212" r="46" fill="url(#glass)" stroke="#B8860B" stroke-width="5"/>
    <!-- filamento = mini-algoritmo (nodi collegati) dentro l'idea -->
    <path d="M342 206 L360 196 L378 206 L360 224 Z" fill="none" stroke="#123E90" stroke-width="3.5"/>
    <circle cx="342" cy="206" r="4.5" fill="#123E90"/>
    <circle cx="378" cy="206" r="4.5" fill="#123E90"/>
    <circle cx="360" cy="196" r="4.5" fill="#1f5fc0"/>
    <circle cx="360" cy="224" r="4.5" fill="#D4A017"/>
    <!-- attacco/vite -->
    <path d="M344 252 h32 l-4 14 h-24 Z" fill="#cbd6e6" stroke="#9fb2cd" stroke-width="2"/>
    <line x1="347" y1="258" x2="373" y2="258" stroke="#9fb2cd" stroke-width="2"/>
    <line x1="349" y1="264" x2="371" y2="264" stroke="#9fb2cd" stroke-width="2"/>
  </g>

  <!-- IMPOSTAZIONI: tre cursori -->
  <g stroke-linecap="round">
    <line x1="196" y1="308" x2="524" y2="308" stroke="#cdd9ea" stroke-width="9"/>
    <line x1="196" y1="308" x2="286" y2="308" stroke="#1f5fc0" stroke-width="9"/>
    <circle cx="286" cy="308" r="14" fill="#fff" stroke="#123E90" stroke-width="4"/>

    <line x1="196" y1="346" x2="524" y2="346" stroke="#cdd9ea" stroke-width="9"/>
    <line x1="196" y1="346" x2="452" y2="346" stroke="#1f5fc0" stroke-width="9"/>
    <circle cx="452" cy="346" r="14" fill="#fff" stroke="#123E90" stroke-width="4"/>

    <line x1="196" y1="384" x2="524" y2="384" stroke="#cdd9ea" stroke-width="9"/>
    <line x1="196" y1="384" x2="360" y2="384" stroke="#D4A017" stroke-width="9"/>
    <circle cx="360" cy="384" r="14" fill="#fff" stroke="#B8860B" stroke-width="4"/>
  </g>

  <!-- ALGORITMI: flusso di nodi con frecce -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="214" y1="424" x2="290" y2="424" stroke="#9fb2cd" stroke-width="3"/>
    <path d="M286 419 l6 5 -6 5" fill="none" stroke="#9fb2cd" stroke-width="3"/>
    <line x1="310" y1="424" x2="386" y2="424" stroke="#9fb2cd" stroke-width="3"/>
    <path d="M382 419 l6 5 -6 5" fill="none" stroke="#9fb2cd" stroke-width="3"/>
    <line x1="406" y1="424" x2="482" y2="424" stroke="#9fb2cd" stroke-width="3"/>
    <path d="M478 419 l6 5 -6 5" fill="none" stroke="#9fb2cd" stroke-width="3"/>
    <circle cx="200" cy="424" r="13" fill="#123E90"/>
    <circle cx="300" cy="424" r="13" fill="#1f5fc0"/>
    <circle cx="396" cy="424" r="13" fill="#1f5fc0"/>
    <circle cx="496" cy="424" r="13" fill="#D4A017"/>
  </g>
</svg>
